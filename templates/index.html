<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum · balance made visible</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
        <!-- Google Fonts - Playfair Display -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(145deg, #120B26  0%, #140F29 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        .hero {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .title {
    font-family: "Playfair Display", serif;
    font-weight: 900;  /* Black - heaviest weight */
    font-size: 6.5rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #b380aa, #c15b6c);  /* Lighter purples for dark bg */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 30px rgba(193, 91, 108, 0.3); /* Optional glow effect */
}
        .subtitle {
            font-size: 2rem;
            font-style: italic;
            color: #7a6a5f;
            margin-bottom: 3rem;
            font-weight: 300;
        }
        .btn-custom {
            padding: 0.8rem 2.5rem;
            margin: 0 0.75rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1.2rem;
            transition: transform 0.2s;
            border: none;
        }
        .btn-custom:hover {
            transform: translateY(-3px);
        }
        .btn-login {
            background-color: #e7d4c0;
            color: #4a3b2f;
        }
        .btn-register {
            background: linear-gradient(145deg, #8e6b8f, #b46f80);
            color: white;
            box-shadow: 0 8px 18px rgba(180, 111, 128, 0.3);
        }
        footer {
            color: #ffffff;
            margin-top: 3rem;
            font-size: 1.5rem;
        }
        /* ===== MOBILE RESPONSIVE FIXES ===== */
@media (max-width: 768px) {
    .title {
        font-size: 4rem;  /* Smaller for tablets */
    }
    
    .subtitle {
        font-size: 1.5rem;
        padding: 0 1rem;
    }
    
    .btn-custom {
        padding: 0.6rem 1.5rem;
        font-size: 1rem;
        margin: 0.5rem;
    }
    
    footer {
        font-size: 1.2rem;
        padding: 0 1rem;
    }
}

@media (max-width: 480px) {
    .title {
        font-size: 3rem;  /* Even smaller for phones */
    }
    
    .subtitle {
        font-size: 1.2rem;
    }
    
    .btn-custom {
        display: block;  /* Stack buttons vertically */
        width: 80%;
        margin: 0.5rem auto;
    }
    
    .btn-custom.me-3 {
        margin-right: auto !important;  /* Override Bootstrap margin */
    }
    
    footer {
        font-size: 1rem;
    }
}


@media (max-width: 360px) {
    .title {
        font-size: 2.5rem;
    }
    
    .subtitle {
        font-size: 1rem;
    }
} 
    </style>
</head>
<body>
    <div class="hero">
        <div class="container">
            <h1 class="title">momentum.</h1>
            <p class="subtitle">Your invisible work, made visible. Your rest, made sacred.</p>
            <div class="mt-4">
                <a href="/login" class="btn btn-custom btn-login me-3">log in</a>
                <a href="/register" class="btn btn-custom btn-register">register</a>
            </div>
            <footer class="mt-5 pt-5">
                <p>For women managing invisible work, emotional load and recovery</p>
            </footer>
        </div>
    </div>

     <!-- Bootstrap JS bundle (optional for interactions) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
